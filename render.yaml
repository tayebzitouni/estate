services:
  - type: web
    name: darak-platform
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /ar
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: darak-postgres
          property: connectionString
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false

databases:
  - name: darak-postgres
    plan: starter
